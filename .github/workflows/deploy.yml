name: Deploy All

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'  # รันเฉพาะถ้า frontend เปลี่ยน
      - 'backend/**'   # รันเฉพาะถ้า backend เปลี่ยน

jobs:
  deploy-vercel:
    runs-on: ubuntu-latest
    # รันเฉพาะถ้าไฟล์ใน frontend/ เปลี่ยน
    if: contains(github.event.commits[0].modified, 'frontend/')
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy Frontend to Vercel
        working-directory: ./frontend
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-render:
    runs-on: ubuntu-latest
    # รันเฉพาะถ้าไฟล์ใน backend/ เปลี่ยน
    if: contains(github.event.commits[0].modified, 'backend/')
    steps:
      - name: Trigger Render Deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"